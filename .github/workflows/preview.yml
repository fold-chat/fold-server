name: Preview Deploy

on:
  pull_request_target:
    types: [labeled, synchronize, closed]
    branches: [main]

permissions: {}

jobs:
  prepare:
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - id: sha
        run: echo "short=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

  build-image:
    needs: [prepare]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: fold-chat/fold-server
      image_tag: pr-${{ github.event.pull_request.number }}-${{ needs.prepare.outputs.short_sha }}
      dockerfile: Dockerfile.native-build
      self_contained: true
      build_version: pr-${{ github.event.pull_request.number }}-${{ needs.prepare.outputs.short_sha }}
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  # --- Deploy preview (label + environment approval required) ---
  deploy:
    needs: [build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment: preview
    concurrency:
      group: fold-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Deploy to Nomad
        env:
          NOMAD_SSH_KEY: ${{ secrets.NOMAD_SSH_KEY }}
          NOMAD_HOST: ${{ secrets.NOMAD_HOST }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$NOMAD_SSH_KEY" > ~/.ssh/nomad_key
          chmod 600 ~/.ssh/nomad_key

          SSH_OPTS="-i ~/.ssh/nomad_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          PR_NUMBER=${{ github.event.pull_request.number }}
          IMAGE="${{ needs.build-image.outputs.image_ref }}"

          sed -e "s|__PR_NUMBER__|${PR_NUMBER}|g" \
              -e "s|__IMAGE_TAG__|${IMAGE}|g" \
              deploy/nomad/fold-preview.nomad.hcl > /tmp/fold-pr-${PR_NUMBER}.nomad.hcl

          scp $SSH_OPTS /tmp/fold-pr-${PR_NUMBER}.nomad.hcl root@${NOMAD_HOST}:/tmp/fold-pr-${PR_NUMBER}.nomad.hcl

          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "NOMAD_TOKEN='${NOMAD_TOKEN}' nomad job run -namespace=ci /tmp/fold-pr-${PR_NUMBER}.nomad.hcl"

      - name: Comment preview URL
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}-preview.fold.chat`;
            const body = `🚀 Preview deployed: ${url}\n\nLogin: \`admin\` / \`preview-admin-pw\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  # --- Teardown on PR close (only if preview was deployed) ---
  teardown:
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    environment: preview

    steps:
      - name: Stop Nomad job
        env:
          NOMAD_SSH_KEY: ${{ secrets.NOMAD_SSH_KEY }}
          NOMAD_HOST: ${{ secrets.NOMAD_HOST }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          PREVIEW_DATA_ROOT: ${{ vars.FOLD_PREVIEW_DATA_ROOT || '/opt/fold/preview' }}
        run: |
          mkdir -p ~/.ssh
          echo "$NOMAD_SSH_KEY" > ~/.ssh/nomad_key
          chmod 600 ~/.ssh/nomad_key

          SSH_OPTS="-i ~/.ssh/nomad_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          PR_NUMBER=${{ github.event.pull_request.number }}
          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "NOMAD_TOKEN='${NOMAD_TOKEN}' nomad job stop -purge -namespace=ci fold-pr-${PR_NUMBER}" || true

          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "rm -rf ${PREVIEW_DATA_ROOT}/pr-${PR_NUMBER}" || true

      - name: Update PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: '🛑 Preview environment torn down. Data path removed.',
              });
            }
