name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build-image:
    if: github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: fray-chat/fray-app
      image_tag: pr-${{ github.event.pull_request.number }}
      dockerfile: Dockerfile.preview
    secrets: inherit
  # --- Deploy preview on PR open/update ---
  deploy:
    if: github.event.action != 'closed'
    needs: [build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: kith-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4


      # Deploy to Nomad
      - name: Deploy to Nomad
        env:
          NOMAD_SSH_KEY: ${{ secrets.NOMAD_SSH_KEY }}
          NOMAD_HOST: ${{ secrets.NOMAD_HOST }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$NOMAD_SSH_KEY" > ~/.ssh/nomad_key
          chmod 600 ~/.ssh/nomad_key

          SSH_OPTS="-i ~/.ssh/nomad_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          PR_NUMBER=${{ github.event.pull_request.number }}
          IMAGE="${{ needs.build-image.outputs.image_ref }}"

          sed -e "s|__PR_NUMBER__|${PR_NUMBER}|g" \
              -e "s|__IMAGE_TAG__|${IMAGE}|g" \
              deploy/nomad/kith-preview.nomad.hcl > /tmp/kith-pr-${PR_NUMBER}.nomad.hcl

          scp $SSH_OPTS /tmp/kith-pr-${PR_NUMBER}.nomad.hcl root@${NOMAD_HOST}:/tmp/kith-pr-${PR_NUMBER}.nomad.hcl

          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "NOMAD_TOKEN='${NOMAD_TOKEN}' nomad job run /tmp/kith-pr-${PR_NUMBER}.nomad.hcl"

      # Comment on PR
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}-preview.fold.chat`;
            const body = `🚀 Preview deployed: ${url}\n\nLogin: \`admin\` / \`preview-admin-pw\``;

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  # --- Teardown on PR close ---
  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Stop Nomad job
        env:
          NOMAD_SSH_KEY: ${{ secrets.NOMAD_SSH_KEY }}
          NOMAD_HOST: ${{ secrets.NOMAD_HOST }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          PREVIEW_DATA_ROOT: ${{ vars.KITH_PREVIEW_DATA_ROOT || '/opt/kith/preview' }}
        run: |
          mkdir -p ~/.ssh
          echo "$NOMAD_SSH_KEY" > ~/.ssh/nomad_key
          chmod 600 ~/.ssh/nomad_key

          SSH_OPTS="-i ~/.ssh/nomad_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          PR_NUMBER=${{ github.event.pull_request.number }}
          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "NOMAD_TOKEN='${NOMAD_TOKEN}' nomad job stop -purge kith-pr-${PR_NUMBER}" || true

          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "rm -rf ${PREVIEW_DATA_ROOT}/pr-${PR_NUMBER}" || true

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: '🛑 Preview environment torn down. Data path removed.',
              });
            }
