name: Build and Push App Image

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name without registry prefix
        required: true
        type: string
      image_tag:
        description: Image tag
        required: true
        type: string
      dockerfile:
        description: Dockerfile path
        required: false
        type: string
        default: Dockerfile.native-build
      self_contained:
        description: Skip client/server pre-build (Dockerfile handles everything)
        required: false
        type: boolean
        default: false
      build_version:
        description: Build version string (e.g. main-abc1234, pr-42-abc1234, v1.0.0)
        required: false
        type: string
        default: snapshot
      checkout_ref:
        description: Git ref to checkout (defaults to triggering event ref)
        required: false
        type: string
        default: ''
    secrets:
      GH_PACKAGES_TOKEN:
        required: true
    outputs:
      image_ref:
        description: Fully qualified image reference
        value: ${{ jobs.build-and-push.outputs.image_ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ inputs.image_name }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      # Pre-build (skipped for self-contained Dockerfiles like Dockerfile.native-build)
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        if: ${{ !inputs.self_contained }}
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: ${{ !inputs.self_contained }}
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Build client
        if: ${{ !inputs.self_contained }}
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build
          mkdir -p ../server/src/main/resources/META-INF/resources
          cp -r build/* ../server/src/main/resources/META-INF/resources/
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        if: ${{ !inputs.self_contained }}
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
        if: ${{ !inputs.self_contained }}
      - name: Build server uber-jar
        if: ${{ !inputs.self_contained }}
        run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.package.jar.type=uber-jar

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build image metadata
        id: meta
        run: |
          echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
            FOLD_BUILD_VERSION=${{ inputs.build_version }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
