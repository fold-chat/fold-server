name: Build and Push App Image

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name without registry prefix
        required: true
        type: string
      image_tag:
        description: Image tag
        required: true
        type: string
      dockerfile:
        description: Dockerfile path
        required: false
        type: string
        default: Dockerfile.preview
    secrets:
      GH_PACKAGES_TOKEN:
        required: true
    outputs:
      image_ref:
        description: Fully qualified image reference
        value: ${{ jobs.build-and-push.outputs.image_ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ inputs.image_name }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image metadata
        id: meta
        run: |
          echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
