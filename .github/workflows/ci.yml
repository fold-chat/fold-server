name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Client
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Build client
        env:
          VITE_BUILD_VERSION: main-${{ steps.sha.outputs.short }}
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build
          pnpm check

      # Server
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      - name: Build server
        run: |
          cd server
          ./gradlew build -Pfold.build.version=main-${{ steps.sha.outputs.short }}

  build-image-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: fold-chat/fold-server
      image_tag: main-${{ needs.build.outputs.short_sha }}
      dockerfile: Dockerfile.native-build
      self_contained: true
      build_version: main-${{ needs.build.outputs.short_sha }}
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-image-main]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: demo
    concurrency:
      group: fold-main-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to Nomad
        env:
          NOMAD_SSH_KEY: ${{ secrets.NOMAD_SSH_KEY }}
          NOMAD_HOST: ${{ secrets.NOMAD_HOST }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          FOLD_DOMAIN: ${{ vars.FOLD_DOMAIN || 'demo.fold.chat' }}
        run: |
          mkdir -p ~/.ssh
          echo "$NOMAD_SSH_KEY" > ~/.ssh/nomad_key
          chmod 600 ~/.ssh/nomad_key

          SSH_OPTS="-i ~/.ssh/nomad_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
          IMAGE="${{ needs.build-image-main.outputs.image_ref }}"

          sed -e "s|__IMAGE_TAG__|${IMAGE}|g" \
              -e "s|__FOLD_DOMAIN__|${FOLD_DOMAIN}|g" \
              deploy/nomad/fold.nomad.hcl > /tmp/fold-main.nomad.hcl

          scp $SSH_OPTS /tmp/fold-main.nomad.hcl root@${NOMAD_HOST}:/tmp/fold-main.nomad.hcl

          ssh $SSH_OPTS root@${NOMAD_HOST} \
            "NOMAD_TOKEN='${NOMAD_TOKEN}' nomad job run -namespace=ci /tmp/fold-main.nomad.hcl"
