name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fray-chat/fray

jobs:
  # 1. Build liblibsql per platform
  build-libsql:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            lib: liblibsql.so
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            lib: liblibsql.so
          - os: macos-14
            target: darwin-aarch64
            lib: liblibsql.dylib
          - os: windows-latest
            target: windows-amd64
            lib: libsql.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server/libsql-c
      - name: Clone & build libsql-c
        run: |
          git clone --depth 1 https://github.com/tursodatabase/libsql-c.git server/libsql-c
          cd server/libsql-c
          cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: libsql-${{ matrix.target }}
          path: server/libsql-c/target/release/${{ matrix.lib }}

  # 2. Build SvelteKit client
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/

  # 3. Fat JAR (all platforms bundled)
  fat-jar:
    needs: [build-libsql, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      # Download all libsql artifacts
      - uses: actions/download-artifact@v4
        with:
          pattern: libsql-*
          path: server/src/main/resources/native/
      - name: Arrange native libs
        run: |
          cd server/src/main/resources/native
          for dir in libsql-*/; do
            target=$(echo "$dir" | sed 's/libsql-//' | sed 's/\///')
            mkdir -p "$target"
            mv "$dir"/* "$target/"
            rmdir "$dir"
          done
      # Download client
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.package.jar.type=uber-jar
      - uses: actions/upload-artifact@v4
        with:
          name: fray-jar
          path: server/build/fray-runner.jar

  # 4–7. Native image builds
  native-linux-amd64:
    needs: [build-libsql, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: libsql-linux-amd64
          path: server/native/linux-amd64/
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-amd64
          path: |
            server/build/fray-runner
            server/native/linux-amd64/liblibsql.so

  native-linux-arm64:
    needs: [build-libsql, build-client]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: libsql-linux-aarch64
          path: server/native/linux-aarch64/
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: |
            server/build/fray-runner
            server/native/linux-aarch64/liblibsql.so

  native-macos-arm64:
    needs: [build-libsql, build-client]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: libsql-darwin-aarch64
          path: server/native/darwin-aarch64/
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: |
            server/build/fray-runner
            server/native/darwin-aarch64/liblibsql.dylib

  native-windows-amd64:
    needs: [build-libsql, build-client]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: libsql-windows-amd64
          path: server/native/windows-amd64/
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-amd64
          path: |
            server/build/fray-runner.exe
            server/native/windows-amd64/libsql.dll

  # 8. Docker multi-arch
  docker:
    needs: [native-linux-amd64, native-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Download native binaries
      - uses: actions/download-artifact@v4
        with:
          name: native-linux-amd64
          path: docker/amd64/
      - uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: docker/arm64/
      - name: Prepare Dockerfiles
        run: |
          # amd64
          cat > docker/amd64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY build/fray-runner /app/fray
          COPY native/linux-amd64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fray"]
          EOF
          # arm64
          cat > docker/arm64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY build/fray-runner /app/fray
          COPY native/linux-aarch64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fray"]
          EOF
      - name: Build & push amd64
        uses: docker/build-push-action@v6
        with:
          context: docker/amd64
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
      - name: Build & push arm64
        uses: docker/build-push-action@v6
        with:
          context: docker/arm64
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
      - name: Create multi-arch manifest
        run: |
          TAG=${{ github.ref_name }}
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-arm64

  # 9. GitHub Release
  release:
    needs: [fat-jar, native-linux-amd64, native-linux-arm64, native-macos-arm64, native-windows-amd64, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: fray-jar
          path: artifacts/fray-jar/
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/fray-jar/fray-runner.jar release/fray.jar
          # Linux amd64
          cp artifacts/native-linux-amd64/server/build/fray-runner release/fray-linux-amd64
          cp artifacts/native-linux-amd64/server/native/linux-amd64/liblibsql.so release/liblibsql-linux-amd64.so
          # Linux arm64
          cp artifacts/native-linux-arm64/server/build/fray-runner release/fray-linux-arm64
          cp artifacts/native-linux-arm64/server/native/linux-aarch64/liblibsql.so release/liblibsql-linux-arm64.so
          # macOS arm64
          cp artifacts/native-macos-arm64/server/build/fray-runner release/fray-darwin-arm64
          cp artifacts/native-macos-arm64/server/native/darwin-aarch64/liblibsql.dylib release/liblibsql-darwin-arm64.dylib
          # Windows amd64
          cp artifacts/native-windows-amd64/server/build/fray-runner.exe release/fray-windows-amd64.exe
          cp artifacts/native-windows-amd64/server/native/windows-amd64/libsql.dll release/libsql-windows-amd64.dll
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
