name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fold-chat/fold
  GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

jobs:
  # 1. Build SvelteKit client
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/

  # 2. Fat JAR (native libs bundled in dependency JAR)
  fat-jar:
    needs: [build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      # Download client
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.package.jar.type=uber-jar
      - uses: actions/upload-artifact@v4
        with:
          name: fold-jar
          path: server/build/fold-runner.jar

  # 3–6. Native image builds (native lib extracted from libsql-java dependency)
  native-linux-amd64:
    needs: [build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-amd64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/linux-amd64/liblibsql.so

  native-linux-arm64:
    needs: [build-client]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/linux-aarch64/liblibsql.so

  native-macos-arm64:
    needs: [build-client]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/darwin-aarch64/liblibsql.dylib

  native-windows-amd64:
    needs: [build-client]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false
          ./gradlew extractNativeLib
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-amd64
          path: |
            server/build/fold-runner.exe
            server/build/extracted-native/native/windows-amd64/libsql.dll

  # 8. Docker multi-arch
  docker:
    needs: [native-linux-amd64, native-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Download native binaries
      - uses: actions/download-artifact@v4
        with:
          name: native-linux-amd64
          path: docker/amd64/
      - uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: docker/arm64/
      - name: Prepare Dockerfiles
        run: |
          # amd64
          cat > docker/amd64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY build/fold-runner /app/fold
          COPY extracted-native/native/linux-amd64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fold"]
          EOF
          # arm64
          cat > docker/arm64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY build/fold-runner /app/fold
          COPY extracted-native/native/linux-aarch64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fold"]
          EOF
      - name: Build & push amd64
        uses: docker/build-push-action@v6
        with:
          context: docker/amd64
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
      - name: Build & push arm64
        uses: docker/build-push-action@v6
        with:
          context: docker/arm64
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
      - name: Create multi-arch manifest
        run: |
          TAG=${{ github.ref_name }}
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-arm64

  # 9. GitHub Release
  release:
    needs: [fat-jar, native-linux-amd64, native-linux-arm64, native-macos-arm64, native-windows-amd64, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: fold-jar
          path: artifacts/fold-jar/
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/fold-jar/fold-runner.jar release/fold.jar
          # Linux amd64
          cp artifacts/native-linux-amd64/build/fold-runner release/fold-linux-amd64
          cp artifacts/native-linux-amd64/extracted-native/native/linux-amd64/liblibsql.so release/liblibsql-linux-amd64.so
          # Linux arm64
          cp artifacts/native-linux-arm64/build/fold-runner release/fold-linux-arm64
          cp artifacts/native-linux-arm64/extracted-native/native/linux-aarch64/liblibsql.so release/liblibsql-linux-arm64.so
          # macOS arm64
          cp artifacts/native-macos-arm64/build/fold-runner release/fold-darwin-arm64
          cp artifacts/native-macos-arm64/extracted-native/native/darwin-aarch64/liblibsql.dylib release/liblibsql-darwin-arm64.dylib
          # Windows amd64
          cp artifacts/native-windows-amd64/build/fold-runner.exe release/fold-windows-amd64.exe
          cp artifacts/native-windows-amd64/extracted-native/native/windows-amd64/libsql.dll release/libsql-windows-amd64.dll
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
