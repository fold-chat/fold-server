name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fold-chat/fold

jobs:
  # 1. Build SvelteKit client
  build-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Build client
        env:
          VITE_BUILD_VERSION: ${{ github.ref_name }}
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-build
          path: client/build/

  # 2. Fat JAR (native libs bundled in dependency JAR)
  fat-jar:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      # Download client
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.package.jar.type=uber-jar -Pfold.build.version=${{ github.ref_name }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fold-jar
          path: server/build/fold-runner.jar

  # 3–6. Native image builds (native lib extracted from libsql-java dependency)
  native-linux-amd64:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false '-Dquarkus.native.additional-build-args[10]=-H:+StripDebugInfo' -Pfold.build.version=${{ github.ref_name }}
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-linux-amd64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/linux-amd64/liblibsql.so

  native-linux-arm64:
    needs: [build-client]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false '-Dquarkus.native.additional-build-args[10]=-H:+StripDebugInfo' -Pfold.build.version=${{ github.ref_name }}
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-linux-arm64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/linux-aarch64/liblibsql.so

  native-macos-arm64:
    needs: [build-client]
    runs-on: macos-14
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -Pfold.build.version=${{ github.ref_name }}
          ./gradlew extractNativeLib
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-macos-arm64
          path: |
            server/build/fold-runner
            server/build/extracted-native/native/darwin-aarch64/liblibsql.dylib

  native-windows-amd64:
    needs: [build-client]
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: 25
          distribution: graalvm-community
      - uses: gradle/actions/setup-gradle@18f1c6724d5bcb313b5c5ef536430a31e5c5b455 # v4.4.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: client-build
          path: server/src/main/resources/META-INF/resources/
      - run: |
          cd server
          ./gradlew quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -Pfold.build.version=${{ github.ref_name }}
          ./gradlew extractNativeLib
        shell: bash
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-windows-amd64
          path: |
            server/build/fold-runner.exe
            server/build/extracted-native/native/windows-amd64/libsql.dll

  # 8. Docker multi-arch
  docker:
    needs: [native-linux-amd64, native-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: demo
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Download native binaries
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: native-linux-amd64
          path: docker/amd64/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: native-linux-arm64
          path: docker/arm64/
      - name: Debug artifact contents
        run: find docker/ -type f
      - name: Prepare Dockerfiles
        run: |
          # amd64
          cat > docker/amd64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY fold-runner /app/fold
          COPY extracted-native/native/linux-amd64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fold"]
          EOF
          # arm64
          cat > docker/arm64/Dockerfile <<'EOF'
          FROM gcr.io/distroless/base-nossl-debian12
          WORKDIR /app
          COPY fold-runner /app/fold
          COPY extracted-native/native/linux-aarch64/liblibsql.so /app/liblibsql.so
          EXPOSE 8080
          ENTRYPOINT ["/app/fold"]
          EOF
      - name: Build & push amd64
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: docker/amd64
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
      - name: Build & push arm64
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: docker/arm64
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
      - name: Create multi-arch manifest
        run: |
          TAG=${{ github.ref_name }}
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-arm64

  # 9. GitHub Release
  release:
    needs: [fat-jar, native-linux-amd64, native-linux-arm64, native-macos-arm64, native-windows-amd64, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: demo
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: native-*
          path: artifacts/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: fold-jar
          path: artifacts/fold-jar/
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/fold-jar/fold-runner.jar release/fold.jar
          # Linux amd64
          cp artifacts/native-linux-amd64/fold-runner release/fold-linux-amd64
          cp artifacts/native-linux-amd64/extracted-native/native/linux-amd64/liblibsql.so release/liblibsql-linux-amd64.so
          # Linux arm64
          cp artifacts/native-linux-arm64/fold-runner release/fold-linux-arm64
          cp artifacts/native-linux-arm64/extracted-native/native/linux-aarch64/liblibsql.so release/liblibsql-linux-arm64.so
          # macOS arm64
          cp artifacts/native-macos-arm64/fold-runner release/fold-darwin-arm64
          cp artifacts/native-macos-arm64/extracted-native/native/darwin-aarch64/liblibsql.dylib release/liblibsql-darwin-arm64.dylib
          # Windows amd64
          cp artifacts/native-windows-amd64/fold-runner.exe release/fold-windows-amd64.exe
          cp artifacts/native-windows-amd64/extracted-native/native/windows-amd64/libsql.dll release/libsql-windows-amd64.dll
      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: release/*
          generate_release_notes: true
