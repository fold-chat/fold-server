# Server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS (dev)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${KITH_CORS_ORIGINS:http://localhost:5173}
%dev.quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# Kith config (env var mappings)
kith.db.path=${KITH_DB_PATH:kith.db}
kith.db.url=${KITH_DB_URL:}
kith.db.auth-token=${KITH_DB_AUTH_TOKEN:}
kith.db.sync-interval=${KITH_DB_SYNC_INTERVAL:60}

# Auth
kith.auth.jwt-secret=${KITH_JWT_SECRET:}
kith.auth.join-password=${KITH_JOIN_PASSWORD:}
kith.auth.invite-enabled=${KITH_INVITE_ENABLED:false}
kith.auth.lockout-threshold=${KITH_LOCKOUT_THRESHOLD:20}
kith.auth.lockout-duration=${KITH_LOCKOUT_DURATION:1440}
kith.auth.dev=${KITH_DEV:false}
%dev.kith.auth.dev=true
kith.auth.admin-username=${KITH_ADMIN_USERNAME:}
kith.auth.admin-password=${KITH_ADMIN_PASSWORD:}

# Files
kith.file.data-dir=${KITH_DATA_DIR:./data}
kith.file.max-upload-size=${KITH_MAX_UPLOAD_SIZE:10485760}

# Rate limiting
kith.rate-limit.enabled=${KITH_RATE_LIMIT_ENABLED:true}
kith.rate-limit.login=${KITH_RATE_LIMIT_LOGIN:}
kith.rate-limit.register=${KITH_RATE_LIMIT_REGISTER:}
kith.rate-limit.invite-join=${KITH_RATE_LIMIT_INVITE_JOIN:}
kith.rate-limit.refresh=${KITH_RATE_LIMIT_REFRESH:}
kith.rate-limit.profile-update=${KITH_RATE_LIMIT_PROFILE_UPDATE:}
kith.rate-limit.password-change=${KITH_RATE_LIMIT_PASSWORD_CHANGE:}
kith.rate-limit.search=${KITH_RATE_LIMIT_SEARCH:}
kith.rate-limit.media-search=${KITH_RATE_LIMIT_MEDIA_SEARCH:}
kith.rate-limit.voice-token=${KITH_RATE_LIMIT_VOICE_TOKEN:}
kith.rate-limit.voice-state=${KITH_RATE_LIMIT_VOICE_STATE:}
kith.rate-limit.voice-moderation=${KITH_RATE_LIMIT_VOICE_MODERATION:}

# Media
kith.media.klipy-api-key=${KITH_KLIPY_API_KEY:}
kith.media.max-cache-size=${KITH_MEDIA_MAX_CACHE_SIZE:512}

# LiveKit (voice/video)
kith.livekit.mode=${KITH_LIVEKIT_MODE:off}
kith.livekit.url=${KITH_LIVEKIT_URL:}
kith.livekit.api-key=${KITH_LIVEKIT_API_KEY:}
kith.livekit.api-secret=${KITH_LIVEKIT_API_SECRET:}
kith.livekit.path=${KITH_LIVEKIT_PATH:livekit-server}
kith.livekit.port=${KITH_LIVEKIT_PORT:7880}
kith.livekit.rtc-tcp-port=${KITH_LIVEKIT_RTC_TCP_PORT:7881}
kith.livekit.rtc-udp-start=${KITH_LIVEKIT_RTC_UDP_START:50000}
kith.livekit.rtc-udp-end=${KITH_LIVEKIT_RTC_UDP_END:60000}
kith.livekit.turn-enabled=${KITH_LIVEKIT_TURN_ENABLED:false}
kith.livekit.turn-udp-port=${KITH_LIVEKIT_TURN_UDP_PORT:3478}
kith.livekit.max-participants=${KITH_LIVEKIT_MAX_PARTICIPANTS:50}
kith.livekit.public-ip=${KITH_LIVEKIT_PUBLIC_IP:}
kith.livekit.webhook-secret=${KITH_LIVEKIT_WEBHOOK_SECRET:}
kith.livekit.e2ee=${KITH_LIVEKIT_E2EE:false}

# Packaging
quarkus.package.output-name=kith

# Native image
quarkus.native.additional-build-args[0]=--enable-native-access=ALL-UNNAMED
quarkus.native.additional-build-args[1]=--initialize-at-run-time=uk.co.rstl.libsql.LibSql,uk.co.rstl.libsql.LibSqlLoader,chat.kith.auth.AuthService,chat.kith.auth.PasswordService,io.jsonwebtoken.impl.security.Randoms,chat.kith.db.MessageRepository,chat.kith.service.EmbeddedLiveKitManager,chat.kith.db.VoiceKeyRepository
quarkus.native.additional-build-args[2]=--features=uk.co.rstl.libsql.LibSqlNativeFeature
quarkus.native.resources.includes=META-INF/services/io.jsonwebtoken.**
quarkus.native.builder-image=graalvm

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."chat.kith".level=DEBUG
