# Server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS (dev)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# JWT
smallrye.jwt.enabled=false
mp.jwt.verify.publickey.location=
mp.jwt.verify.issuer=fray

# Fray config (env var mappings)
fray.db.path=${FRAY_DB_PATH:fray.db}
fray.db.url=${FRAY_DB_URL:}
fray.db.auth-token=${FRAY_DB_AUTH_TOKEN:}
fray.db.sync-interval=${FRAY_DB_SYNC_INTERVAL:60}

# Packaging
quarkus.package.jar.type=uber-jar
quarkus.package.output-name=fray

# Native image
quarkus.native.additional-build-args=--enable-native-access=ALL-UNNAMED
quarkus.native.builder-image=graalvm

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."chat.fray".level=DEBUG
