# Server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS (dev)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# Fray config (env var mappings)
fray.db.path=${FRAY_DB_PATH:fray.db}
fray.db.url=${FRAY_DB_URL:}
fray.db.auth-token=${FRAY_DB_AUTH_TOKEN:}
fray.db.sync-interval=${FRAY_DB_SYNC_INTERVAL:60}

# Auth
fray.auth.jwt-secret=${FRAY_JWT_SECRET:}
fray.auth.join-password=${FRAY_JOIN_PASSWORD:}
fray.auth.invite-enabled=${FRAY_INVITE_ENABLED:false}
fray.auth.lockout-threshold=${FRAY_LOCKOUT_THRESHOLD:20}
fray.auth.lockout-duration=${FRAY_LOCKOUT_DURATION:1440}
fray.auth.dev=${FRAY_DEV:false}
%dev.fray.auth.dev=true
fray.auth.admin-username=${FRAY_ADMIN_USERNAME:}
fray.auth.admin-password=${FRAY_ADMIN_PASSWORD:}

# Files
fray.file.data-dir=${FRAY_DATA_DIR:./data}
fray.file.max-upload-size=${FRAY_MAX_UPLOAD_SIZE:10485760}

# Rate limiting
fray.rate-limit.enabled=${FRAY_RATE_LIMIT_ENABLED:true}
fray.rate-limit.login=${FRAY_RATE_LIMIT_LOGIN:}
fray.rate-limit.register=${FRAY_RATE_LIMIT_REGISTER:}
fray.rate-limit.invite-join=${FRAY_RATE_LIMIT_INVITE_JOIN:}
fray.rate-limit.refresh=${FRAY_RATE_LIMIT_REFRESH:}
fray.rate-limit.profile-update=${FRAY_RATE_LIMIT_PROFILE_UPDATE:}
fray.rate-limit.password-change=${FRAY_RATE_LIMIT_PASSWORD_CHANGE:}
fray.rate-limit.search=${FRAY_RATE_LIMIT_SEARCH:}
fray.rate-limit.media-search=${FRAY_RATE_LIMIT_MEDIA_SEARCH:}
fray.rate-limit.voice-token=${FRAY_RATE_LIMIT_VOICE_TOKEN:}
fray.rate-limit.voice-state=${FRAY_RATE_LIMIT_VOICE_STATE:}
fray.rate-limit.voice-moderation=${FRAY_RATE_LIMIT_VOICE_MODERATION:}

# Media
fray.media.klipy-api-key=${FRAY_KLIPY_API_KEY:}
fray.media.max-cache-size=${FRAY_MEDIA_MAX_CACHE_SIZE:512}

# LiveKit (voice/video)
fray.livekit.mode=${FRAY_LIVEKIT_MODE:off}
fray.livekit.url=${FRAY_LIVEKIT_URL:}
fray.livekit.api-key=${FRAY_LIVEKIT_API_KEY:}
fray.livekit.api-secret=${FRAY_LIVEKIT_API_SECRET:}
fray.livekit.path=${FRAY_LIVEKIT_PATH:livekit-server}
fray.livekit.port=${FRAY_LIVEKIT_PORT:7880}
fray.livekit.rtc-tcp-port=${FRAY_LIVEKIT_RTC_TCP_PORT:7881}
fray.livekit.rtc-udp-start=${FRAY_LIVEKIT_RTC_UDP_START:50000}
fray.livekit.rtc-udp-end=${FRAY_LIVEKIT_RTC_UDP_END:60000}
fray.livekit.turn-enabled=${FRAY_LIVEKIT_TURN_ENABLED:false}
fray.livekit.turn-udp-port=${FRAY_LIVEKIT_TURN_UDP_PORT:3478}
fray.livekit.max-participants=${FRAY_LIVEKIT_MAX_PARTICIPANTS:50}
fray.livekit.public-ip=${FRAY_LIVEKIT_PUBLIC_IP:}
fray.livekit.webhook-secret=${FRAY_LIVEKIT_WEBHOOK_SECRET:}

# Packaging
quarkus.package.output-name=fray

# Native image
quarkus.native.additional-build-args[0]=--enable-native-access=ALL-UNNAMED
quarkus.native.additional-build-args[1]=--initialize-at-run-time=chat.fray.db.LibSql,chat.fray.db.LibSqlLoader,chat.fray.auth.AuthService,chat.fray.auth.PasswordService,io.jsonwebtoken.impl.security.Randoms,chat.fray.db.MessageRepository,chat.fray.service.EmbeddedLiveKitManager,chat.fray.db.VoiceKeyRepository
quarkus.native.additional-build-args[2]=--features=chat.fray.db.LibSqlNativeFeature
quarkus.native.resources.includes=META-INF/services/io.jsonwebtoken.**
quarkus.native.builder-image=graalvm

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."chat.fray".level=DEBUG
