# Server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.banner.path=banner.txt

# CORS (dev)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${FOLD_CORS_ORIGINS:http://localhost:5173}
%dev.quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# Fold config (env var mappings)
fold.db.path=${FOLD_DB_PATH:fold.db}
fold.db.url=${FOLD_DB_URL:}
fold.db.auth-token=${FOLD_DB_AUTH_TOKEN:}
fold.db.sync-interval=${FOLD_DB_SYNC_INTERVAL:60}

# Auth
fold.auth.jwt-secret=${FOLD_JWT_SECRET:}
fold.auth.join-password=${FOLD_JOIN_PASSWORD:}
fold.auth.invite-enabled=${FOLD_INVITE_ENABLED:false}
fold.auth.lockout-threshold=${FOLD_LOCKOUT_THRESHOLD:20}
fold.auth.lockout-duration=${FOLD_LOCKOUT_DURATION:1440}
fold.auth.dev=${FOLD_DEV:false}
%dev.fold.auth.dev=true
fold.auth.admin-username=${FOLD_ADMIN_USERNAME:}
fold.auth.admin-password=${FOLD_ADMIN_PASSWORD:}

# Files
fold.file.data-dir=${FOLD_DATA_DIR:./data}
fold.file.max-upload-size=${FOLD_MAX_UPLOAD_SIZE:10485760}

# Media processing
fold.media-processing.max-video-duration=${FOLD_MEDIA_MAX_VIDEO_DURATION:300}
fold.media-processing.max-video-size=${FOLD_MEDIA_MAX_VIDEO_SIZE:104857600}
fold.media-processing.max-image-size=${FOLD_MEDIA_MAX_IMAGE_SIZE:20971520}
fold.media-processing.thumbnail-max-width=${FOLD_MEDIA_THUMBNAIL_MAX_WIDTH:400}
fold.media-processing.ffmpeg-path=${FOLD_FFMPEG_PATH:ffmpeg}
fold.media-processing.ffprobe-path=${FOLD_FFPROBE_PATH:ffprobe}
fold.media-processing.video-mode=${FOLD_VIDEO_MODE:no-transcode}
fold.media-processing.hw-accel=${FOLD_HW_ACCEL:auto}
fold.media-processing.max-concurrent-jobs=${FOLD_MAX_CONCURRENT_JOBS:2}

# Max upload body size (100MB for video)
quarkus.http.limits.max-body-size=104857600

# Rate limiting
fold.rate-limit.enabled=${FOLD_RATE_LIMIT_ENABLED:true}
fold.rate-limit.login=${FOLD_RATE_LIMIT_LOGIN:}
fold.rate-limit.register=${FOLD_RATE_LIMIT_REGISTER:}
fold.rate-limit.invite-join=${FOLD_RATE_LIMIT_INVITE_JOIN:}
fold.rate-limit.refresh=${FOLD_RATE_LIMIT_REFRESH:}
fold.rate-limit.profile-update=${FOLD_RATE_LIMIT_PROFILE_UPDATE:}
fold.rate-limit.password-change=${FOLD_RATE_LIMIT_PASSWORD_CHANGE:}
fold.rate-limit.search=${FOLD_RATE_LIMIT_SEARCH:}
fold.rate-limit.media-search=${FOLD_RATE_LIMIT_MEDIA_SEARCH:}
fold.rate-limit.voice-token=${FOLD_RATE_LIMIT_VOICE_TOKEN:}
fold.rate-limit.voice-state=${FOLD_RATE_LIMIT_VOICE_STATE:}
fold.rate-limit.voice-moderation=${FOLD_RATE_LIMIT_VOICE_MODERATION:}

# Media
fold.media.klipy-api-key=${FOLD_KLIPY_API_KEY:}
fold.media.max-cache-size=${FOLD_MEDIA_MAX_CACHE_SIZE:512}
fold.media.cache-ttl=${FOLD_MEDIA_CACHE_TTL:24}
fold.media.youtube-embed=${FOLD_MEDIA_YOUTUBE_EMBED:true}
fold.media.max-proxy-image-size=${FOLD_MEDIA_MAX_PROXY_IMAGE_SIZE:3145728}
fold.media.max-images-per-message=${FOLD_MEDIA_MAX_IMAGES_PER_MESSAGE:5}

# LiveKit (voice/video)
fold.livekit.mode=${FOLD_LIVEKIT_MODE:off}
fold.livekit.url=${FOLD_LIVEKIT_URL:}
fold.livekit.api-key=${FOLD_LIVEKIT_API_KEY:}
fold.livekit.api-secret=${FOLD_LIVEKIT_API_SECRET:}
fold.livekit.central-url=${FOLD_CENTRAL_URL:https://central.fold.chat}
fold.livekit.central-api-key=${FOLD_CENTRAL_API_KEY:}
fold.livekit.path=${FOLD_LIVEKIT_PATH:livekit-server}
fold.livekit.port=${FOLD_LIVEKIT_PORT:7880}
fold.livekit.rtc-tcp-port=${FOLD_LIVEKIT_RTC_TCP_PORT:7881}
fold.livekit.rtc-udp-start=${FOLD_LIVEKIT_RTC_UDP_START:50000}
fold.livekit.rtc-udp-end=${FOLD_LIVEKIT_RTC_UDP_END:60000}
fold.livekit.turn-enabled=${FOLD_LIVEKIT_TURN_ENABLED:false}
fold.livekit.turn-udp-port=${FOLD_LIVEKIT_TURN_UDP_PORT:3478}
fold.livekit.max-participants=${FOLD_LIVEKIT_MAX_PARTICIPANTS:50}
fold.livekit.public-ip=${FOLD_LIVEKIT_PUBLIC_IP:}
fold.livekit.webhook-url=${FOLD_LIVEKIT_WEBHOOK_URL:http://localhost:8080}
fold.livekit.webhook-secret=${FOLD_LIVEKIT_WEBHOOK_SECRET:}
fold.livekit.e2ee=${FOLD_LIVEKIT_E2EE:false}

# Packaging
quarkus.package.output-name=fold

# Native image
quarkus.native.additional-build-args[0]=--enable-native-access=ALL-UNNAMED
quarkus.native.additional-build-args[1]=--initialize-at-run-time=uk.co.rstl.libsql.LibSql,uk.co.rstl.libsql.LibSqlLoader,chat.fold.auth.AuthService,chat.fold.auth.PasswordService,io.jsonwebtoken.impl.security.Randoms,chat.fold.db.MessageRepository,chat.fold.service.EmbeddedLiveKitManager,chat.fold.db.VoiceKeyRepository,chat.fold.service.MediaProcessingService,chat.fold.service.BackupService
quarkus.native.additional-build-args[2]=--features=uk.co.rstl.libsql.LibSqlNativeFeature
quarkus.native.additional-build-args[3]=-R:MaxHeapSize=128m
quarkus.native.additional-build-args[4]=-R:MinHeapSize=16m
quarkus.native.additional-build-args[5]=-R:MaxNewSize=16m
quarkus.native.additional-build-args[6]=-R:MaxHeapFree=20m
quarkus.native.additional-build-args[7]=-Os
quarkus.native.additional-build-args[8]=-march=compatibility
quarkus.native.additional-build-args[9]=-H:+SharedArenaSupport
quarkus.native.resources.includes=META-INF/services/io.jsonwebtoken.**,db/migration/*.sql,banner.txt
quarkus.native.builder-image=graalvm

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
